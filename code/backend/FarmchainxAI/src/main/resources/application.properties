spring.application.name=FarmchainXAI
server.port=8080

# ========================
# DATABASE CONFIGURATION
# ========================
spring.datasource.url=jdbc:mysql://localhost:3306/farmchainxai?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=rishab
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================
# JPA/HIBERNATE CONFIGURATION
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.jakarta.persistence.validation.mode=none

farmchain.batch.trace-url=http://localhost:5173/batch
# ========================
# JWT CONFIGURATION
# ========================
# IMPORTANT: Change this secret to a strong random key in production!
# Generate a 64+ character random string for security
jwt.secret=your-super-secret-key-that-is-long-enough-for-hmac-sha-512-algorithm-minimum-64-characters-recommended-change-this-in-production
jwt.access-token-expiration=3600000
jwt.refresh-token-expiration=604800000

# ========================
# LOGGING CONFIGURATION
# ========================
logging.level.root=INFO
logging.level.org.springframework=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.infosys.project.farmchainxai=DEBUG

